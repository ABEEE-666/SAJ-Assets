            padding: 10px 24px;

            transition: all 0.3s ease;

            color: var(--saj-yellow);
            transform: translateY(-2px);

            transform: translateY(-2px);

            position: absolute;
            top: -100px;
            right: -100px;
            width: 450px;
            height: 450px;
            background-color: var(--saj-yellow);
            border-radius: 50%;
            opacity: 0.15;
            z-index: 0;
        }

        .saj-card {
            background: var(--saj-white);
            border-radius: 24px; /* Sudut melengkung yang lebih playful */
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            overflow: hidden;
        }
        .saj-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,51,51,0.1);
        }
        
        /* Ikon Kotak */
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #e6eeee;
            color: var(--saj-green);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px auto;
            transition: transform 0.3s ease;
        }

            transform: rotate(10deg) scale(1.1);
            background-color: var(--saj-yellow);
        }

        .swiper-pagination-bullet {
            width: 12px;
            height: 12px;
            background-color: #fff;
            opacity: 0.5;
        }
        .swiper-pagination-bullet-active {
            background-color: var(--saj-yellow) !important;
            opacity: 1;

            right: 30px;

            color: white;

            <section id="testimoni" class="py-5 bg-primary-saj text-white" style="position:relative; overflow:hidden;">
                <!-- Decorative element -->
                <div style="position:absolute; top:-50px; left:-50px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.05);"></div>
                
                <div class="container py-5 position-relative" style="z-index: 1;">
                    <div class="text-center mb-5" data-aos="fade-up">
                        <h2 class="fw-bold text-white display-6">${config.testimonials.title}</h2>
                        <div class="bg-secondary-saj mx-auto mt-3" style="width: 80px; height: 6px; border-radius: 3px;"></div>
                    </div>
                    
                    <div class="swiper mySwiper pb-5" data-aos="fade-up" data-aos-delay="200">
                        <div class="swiper-wrapper">
                            ${config.testimonials.items.map(testi => `
                                <div class="swiper-slide">
                                    <div class="bg-white text-dark p-4 p-xl-5 rounded-4 shadow mx-2 h-100 d-flex flex-column">
                                        <div class="text-secondary-saj mb-3 fs-5">
                                            ${Array(testi.rating).fill('<i class="fa-solid fa-star"></i>').join('')}
                                        </div>
                                        <p class="fst-italic mb-4 flex-grow-1 text-muted">"${testi.text}"</p>
                                        <div class="d-flex align-items-center mt-auto">
                                            <div class="bg-primary-saj text-white rounded-circle d-flex justify-content-center align-items-center fw-bold fs-4 me-3" style="width: 50px; height: 50px;">
                                                ${testi.name.charAt(0)}
                                            </div>
                                            <h6 class="fw-bold mb-0 text-primary-saj">${testi.name}</h6>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="swiper-pagination mt-4"></div>
                    </div>
                </div>
            </section>
        `;

        const renderFAQ = () => `
            <section id="faq" class="py-5 bg-white">
                <div class="container py-5">
                    <div class="row justify-content-center">
                        <div class="col-lg-8" data-aos="fade-up">
                            <div class="text-center mb-5">
                                <h2 class="fw-bold text-primary-saj display-6">${config.faq.title}</h2>
                                <div class="bg-secondary-saj mx-auto mt-3" style="width: 80px; height: 6px; border-radius: 3px;"></div>
                            </div>
                            
                            <div class="accordion accordion-flush shadow-sm rounded-4 border p-2" id="accordionFAQ">
                                ${config.faq.items.map((item, index) => `
                                    <div class="accordion-item border-0 ${index !== config.faq.items.length - 1 ? 'border-bottom' : ''}">
                                        <h2 class="accordion-header" id="heading${index}">
                                            <button class="accordion-button ${index === 0 ? '' : 'collapsed'} fw-bold fs-5" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="${index === 0 ? 'true' : 'false'}" aria-controls="collapse${index}" style="border-radius: 12px;">
                                                ${item.q}
                                            </button>
                                        </h2>
                                        <div id="collapse${index}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" aria-labelledby="heading${index}" data-bs-parent="#accordionFAQ">
                                            <div class="accordion-body text-muted lh-lg">
                                                ${item.a}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        `;

        const renderFooter = () => `
            <footer class="bg-dark text-white pt-5 pb-4 mt-5">
                <style>
                    .footer-link { transition: all 0.3s ease; }
                    .footer-link:hover { color: var(--saj-yellow) !important; padding-left: 5px; }
                </style>
                <div class="container">
                    <div class="row g-4 mb-5">
                        <!-- Kolom 1: Alamat & Map -->
                        <div class="col-lg-4 col-md-6 pe-lg-4">
                            <div class="mb-4">
                                <img src="${config.logo}" alt="${config.brandName}" height="50" class="mb-3 bg-white p-2 rounded">
                                <h4 class="fw-bold">${config.brandName}</h4>
                            </div>
                            <h5 class="fw-bold mb-3 text-secondary-saj">Alamat Kami</h5>
                            <p class="text-white-50 lh-lg mb-3">
                                <i class="fa-solid fa-location-dot me-2"></i> ${config.footer.address.text}
                            </p>
                            <div class="mt-3 rounded overflow-hidden shadow-sm border border-secondary" style="height: 150px;">
                                <iframe src="${config.footer.address.mapEmbed}" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>
                            <a href="${config.footer.address.mapUrl}" target="_blank" class="btn btn-outline-light btn-sm rounded-pill mt-3 w-100">
                                <i class="fa-solid fa-map-location-dot me-2"></i> Buka di Google Maps
                            </a>
                        </div>
                        
                        <!-- Kolom 2: Quicklink -->
                        <div class="col-lg-2 col-md-6">
                            <h5 class="fw-bold mb-4 text-secondary-saj">Quicklink</h5>
                            <ul class="list-unstyled">
                                ${config.footer.quicklinks.map(link => `
                                    <li class="mb-3">
                                        <a href="${link.url}" class="text-white-50 text-decoration-none footer-link d-inline-block">
                                            <i class="fa-solid fa-angle-right me-2 small"></i>${link.label}
                                        </a>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        
                        <!-- Kolom 3: Sosmed -->
                        <div class="col-lg-3 col-md-6">
                            <h5 class="fw-bold mb-4 text-secondary-saj">Sosmed</h5>
                            <ul class="list-unstyled">
                                ${config.footer.sosmed.map(social => `
                                    <li class="mb-3">
                                        <a href="${social.url}" target="_blank" class="text-white-50 text-decoration-none d-flex align-items-center footer-link">
                                            ${social.customIcon ? 
                                                `<img src="${social.customIcon}" alt="${social.label}" class="me-3" style="width: 20px; height: 20px; object-fit: contain;">` :
                                                `<i class="${social.icon} fs-5 me-3 text-secondary-saj" style="width: 20px;"></i>`
                                            } ${social.label}
                                        </a>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        
                        <!-- Kolom 4: Hubungi Kami -->
                        <div class="col-lg-3 col-md-6">
                            <h5 class="fw-bold mb-4 text-secondary-saj">Hubungi Kami</h5>
                            <ul class="list-unstyled">
                                <li class="mb-3">
                                    <a href="mailto:${config.footer.contact.email}" class="text-white-50 text-decoration-none d-flex align-items-center footer-link">
                                        <i class="fa-solid fa-envelope fs-5 me-3 text-secondary-saj" style="width: 20px;"></i> ${config.footer.contact.email}
                                    </a>
                                </li>
                                <li class="mb-3">
                                    <a href="https://wa.me/${config.whatsapp}" target="_blank" class="text-white-50 text-decoration-none d-flex align-items-center footer-link">
                                        <i class="fa-brands fa-whatsapp fs-5 me-3 text-secondary-saj" style="width: 20px;"></i> ${config.footer.contact.phone}
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                    
                    <!-- Copyright -->
                    <div class="border-top border-secondary pt-4 text-center">
                        <p class="small mb-0 text-white-50">${config.footer.copyright}</p>
                    </div>
                </div>
            </footer>
            
            <!-- Floating WA Button -->
            <a href="https://wa.me/${config.whatsapp}" class="floating-wa" target="_blank" aria-label="WhatsApp Kami">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        `;

        /**
         * ----------------------------------------------------
         * 3. INISIALISASI (Jalankan semua fungsi)
         * ----------------------------------------------------
         */
        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            
            // Gabungkan semua komponen HTML
            app.innerHTML = `
                ${renderNavbar()}
                ${renderHero()}
                ${renderFeatures()}
                ${renderPackages()}
                ${renderTestimonials()}
                ${renderFAQ()}
                ${renderFooter()}
            `;

            // Inisialisasi AOS (Animasi Scroll)
            AOS.init({
                duration: 800, // Durasi animasi
                once: true,    // Hanya diputar sekali saat di-scroll
                offset: 50     // Jarak scroll sebelum animasi jalan
            });

            // Inisialisasi Swiper (Carousel Testimoni)
            new Swiper(".mySwiper", {
                slidesPerView: 1,
                spaceBetween: 30,
                grabCursor: true,
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
                breakpoints: {
                    // Mobile
                    768: {
                        slidesPerView: 2,
                    },
                    // Desktop
                    1024: {
                        slidesPerView: 3,
                    }
                }
            });

            // Inisialisasi CountUp.js
            if(typeof countUp !== 'undefined') {
                const yearCount = new countUp.CountUp('count-year', config.hero.stats.year, { useGrouping: false, duration: 2.5 });
                if (!yearCount.error) { yearCount.start(); } else { console.error(yearCount.error); }
                
                const customersCount = new countUp.CountUp('count-customers', config.hero.stats.customers, { duration: 3 });
                if (!customersCount.error) { customersCount.start(); } else { console.error(customersCount.error); }
            }

            // Inisialisasi Typed.js
            if(typeof Typed !== 'undefined') {
                new Typed('#typed-rating', {
                    strings: [config.hero.stats.rating],
                    typeSpeed: 50,
                    showCursor: false
                });
            }
        });
    </script>
</body>
</html>
